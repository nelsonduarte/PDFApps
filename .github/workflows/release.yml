name: Release (bump version & tag)

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'New version (e.g. 1.10.0 — without the leading v)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  bump-and-tag:
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ secrets.AP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Validate version format
        run: |
          if ! echo "${{ inputs.version }}" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Invalid version '${{ inputs.version }}' — expected MAJOR.MINOR.PATCH"
            exit 1
          fi

      - name: Read current version
        id: current
        run: |
          OLD=$(grep -oP 'APP_VERSION\s*=\s*"\K[^"]+' app/constants.py)
          echo "old=$OLD" >> "$GITHUB_OUTPUT"
          echo "Old version: $OLD"
          echo "New version: ${{ inputs.version }}"

      - name: Abort if tag already exists
        run: |
          if git rev-parse "v${{ inputs.version }}" >/dev/null 2>&1; then
            echo "::error::Tag v${{ inputs.version }} already exists"
            exit 1
          fi

      - name: Bump version everywhere
        env:
          OLD: ${{ steps.current.outputs.old }}
          NEW: ${{ inputs.version }}
        run: |
          python - <<'PY'
          import os, re, sys
          from pathlib import Path

          old = os.environ["OLD"]
          new = os.environ["NEW"]
          old_re = re.escape(old)
          # Generic semver pattern. Used for packaging files where the
          # version string may have drifted out of sync with app/constants.py
          # (root cause of the v1.13.9 Snap Store freeze: snapcraft.yaml stayed
          # at 1.13.9 from v1.13.10 onward because OLD no longer matched).
          ANY = r"\d+\.\d+\.\d+"

          # (path, list of (regex, replacement), bool: required) tuples.
          # required=True targets fail the job if no substitution happens.
          targets = [
              ("app/constants.py", [
                  (rf'APP_VERSION\s*=\s*"{old_re}"', f'APP_VERSION = "{new}"'),
              ], True),
              ("installer.py", [
                  (rf'APP_VERSION\s*=\s*"{ANY}"', f'APP_VERSION = "{new}"'),
              ], True),
              ("docs/index.html", [
                  (rf'"softwareVersion":\s*"{ANY}"', f'"softwareVersion": "{new}"'),
                  (rf'v{old_re}', f'v{new}'),
              ], True),
              # changelog.html carries the *whole* release history: every past
              # release has a ``<span class="version-tag">v...</span>`` heading
              # that must NEVER change. A global ``v{old}`` rewrite clobbered the
              # topmost historical heading every release (this is why v1.13.16
              # "disappeared" in 72f25e8: its heading was renamed to v1.13.17).
              # Anchor the bump to the footer changelog link ONLY. New release
              # headings (incl. moving the "Latest" badge) are an editorial step
              # done by hand in the same PR that ships the feature work.
              #
              # The href accepts both the clean-URL form ``/changelog`` (current,
              # since the SEO clean-URL migration) and the legacy ``changelog.html``
              # form, so this stays anchored to the footer link regardless of which
              # shape the site uses. It must NEVER be relaxed into a global
              # ``v{old}`` rewrite: that is what clobbered the historical
              # ``<span class="version-tag">`` headings every release.
              ("docs/changelog.html", [
                  (
                      rf'(<a href="(?:/changelog|changelog\.html)">)v{old_re}(</a>)',
                      rf'\g<1>v{new}\g<2>',
                  ),
              ], True),
              # Every remaining marketing page carries the current version only,
              # in an eyebrow badge and/or the footer changelog link (no historical
              # version strings — verified by grep). The global ``v{old}`` -> ``v{new}``
              # rewrite is therefore safe and keeps all pages in lock-step. required=True
              # so the release fails loudly if a page ever drifts off the old tag
              # (instead of silently masking the drift).
              ("docs/download.html", [
                  (rf'v{old_re}', f'v{new}'),
              ], True),
              ("docs/features.html", [
                  (rf'v{old_re}', f'v{new}'),
              ], True),
              ("docs/privacy.html", [
                  (rf'v{old_re}', f'v{new}'),
              ], True),
              ("docs/docs.html", [
                  (rf'v{old_re}', f'v{new}'),
              ], True),
              ("snap/snapcraft.yaml", [
                  (rf"version:\s*'{ANY}'", f"version: '{new}'"),
              ], True),
              ("rpm/pdfapps.spec", [
                  (rf'^Version:\s+{ANY}', f'Version:        {new}'),
              ], True),
              ("aur/pdfapps/PKGBUILD", [
                  (rf'pkgver={ANY}', f'pkgver={new}'),
              ], True),
              ("aur/pdfapps/.SRCINFO", [
                  (rf'pkgver = {ANY}', f'pkgver = {new}'),
                  # R10 #9: anchor the source-tarball replacement to
                  # the ``.tar.gz`` suffix + URL contexts. The previous
                  # unanchored ``v{ANY}`` would happily rewrite a
                  # future comment line like ``# since v1.10.0``.
                  (rf'pdfapps-{ANY}\.tar\.gz', f'pdfapps-{new}.tar.gz'),
                  (rf'/v{ANY}\.tar\.gz', f'/v{new}.tar.gz'),
              ], True),
              ("aur/pdfapps-bin/PKGBUILD", [
                  (rf'pkgver={ANY}', f'pkgver={new}'),
              ], True),
              ("aur/pdfapps-bin/.SRCINFO", [
                  (rf'pkgver = {ANY}', f'pkgver = {new}'),
                  (rf'provides = pdfapps={ANY}', f'provides = pdfapps={new}'),
                  # R10 #9: as for the source AUR variant — anchor on
                  # path/tarball context so a future "# since v1.10.0"
                  # comment is not rewritten by an unanchored v{ANY}.
                  (rf'/v{ANY}/', f'/v{new}/'),
                  (rf'pdfapps-{ANY}\.tar\.gz', f'pdfapps-{new}.tar.gz'),
              ], True),
              ("winget/nelsonduarte.PDFApps.installer.yaml", [
                  (rf'PackageVersion:\s*{ANY}', f'PackageVersion: {new}'),
                  (rf'v{ANY}', f'v{new}'),
              ], True),
              ("winget/nelsonduarte.PDFApps.locale.en-US.yaml", [
                  (rf'PackageVersion:\s*{ANY}', f'PackageVersion: {new}'),
                  (rf'v{ANY}', f'v{new}'),
              ], True),
              ("winget/nelsonduarte.PDFApps.yaml", [
                  (rf'PackageVersion:\s*{ANY}', f'PackageVersion: {new}'),
              ], True),
              ("flatpak/io.github.nelsonduarte.PDFApps.yml", [
                  (rf'tag:\s*v{ANY}', f'tag: v{new}'),
              ], True),
          ]

          missing_required = []
          stale_required = []
          for path_str, subs, required in targets:
              p = Path(path_str)
              if not p.exists():
                  print(f"skip (missing): {path_str}")
                  if required:
                      missing_required.append(path_str)
                  continue
              text = p.read_text(encoding="utf-8")
              original = text
              for pattern, repl in subs:
                  text = re.sub(pattern, repl, text, flags=re.MULTILINE)
              if text != original:
                  p.write_text(text, encoding="utf-8")
                  print(f"updated: {path_str}")
              else:
                  # Already at the new version? Then unchanged is fine.
                  if new in original:
                      print(f"already at {new}: {path_str}")
                  else:
                      print(f"unchanged (no match!): {path_str}")
                      if required:
                          stale_required.append(path_str)

          if missing_required or stale_required:
              if missing_required:
                  print(f"::error::Required packaging files missing: {missing_required}")
              if stale_required:
                  print(f"::error::Required packaging files did not match any version pattern and are not at {new}: {stale_required}")
              sys.exit(1)
          PY

      - name: Show diff
        run: git --no-pager diff --stat

      - name: Commit, tag and push
        env:
          NEW: ${{ inputs.version }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: bump version to ${NEW}"
          git tag -a "v${NEW}" -m "Release v${NEW}"
          git push origin HEAD
          git push origin "v${NEW}"

      - name: Summary
        run: |
          echo "### ✅ Bumped to v${{ inputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Tag \`v${{ inputs.version }}\` was pushed — \`build.yml\` will now build and publish the release." >> $GITHUB_STEP_SUMMARY
