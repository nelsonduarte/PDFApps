name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact: PDFApps-Windows
          - os: ubuntu-22.04
            artifact: PDFApps-Linux
          - os: macos-latest
            artifact: PDFApps-macOS

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ── Windows ─────────────────────────────────────────────────
      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: |
          python -m PyInstaller --noconfirm pdfapps.spec
          python -m PyInstaller --noconfirm uninstaller.spec
          python -m PyInstaller --noconfirm installer.spec

      - name: Upload (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ${{ matrix.artifact }}
          path: |
            dist/PDFApps.exe
            dist/PDFAppsSetup.exe
            dist/PDFAppsUninstall.exe

      # ── Linux ───────────────────────────────────────────────────
      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libxkbcommon0 libxcb-cursor0

      - name: Build (Linux)
        if: runner.os == 'Linux'
        run: |
          python -m PyInstaller --noconfirm pdfapps.spec
          chmod +x dist/PDFApps
          tar -czf dist/PDFApps-Linux.tar.gz -C dist PDFApps

      - name: Upload (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ${{ matrix.artifact }}
          path: dist/PDFApps-Linux.tar.gz

      # ── macOS ───────────────────────────────────────────────────
      - name: Build (macOS)
        if: runner.os == 'macOS'
        run: |
          python -m PyInstaller --noconfirm pdfapps.spec
          chmod +x dist/PDFApps
          cd dist && zip -r PDFApps-macOS.zip PDFApps

      - name: Upload (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ${{ matrix.artifact }}
          path: dist/PDFApps-macOS.zip

  appimage:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.10'
      - name: Install AppImage build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse2 libegl1 libxkbcommon0 libxcb-cursor0 wget
      - name: Build AppImage
        run: |
          chmod +x appimage/build.sh
          ./appimage/build.sh
      - name: Upload AppImage
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: PDFApps-AppImage
          path: PDFApps-*.AppImage

  release:
    needs: [build, appimage]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@d72941d797fd3113feb6b93fd0dec494b13a2547 # v1
        with:
          app-id: ${{ secrets.AP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          token: ${{ steps.app-token.outputs.token }}
          generate_release_notes: true
          files: |
            artifacts/PDFApps-Windows/PDFAppsSetup.exe
            artifacts/PDFApps-Windows/PDFApps.exe
            artifacts/PDFApps-Linux/PDFApps-Linux.tar.gz
            artifacts/PDFApps-macOS/PDFApps-macOS.zip
            artifacts/PDFApps-AppImage/PDFApps-*.AppImage
